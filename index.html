<!DOCTYPE html>
<html>
<head>
    <title>Fresh Start Test</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #00ffcc; text-align: center; margin-top: 15%; }
        h1 { font-size: 4em; }
        p { font-size: 1.5em; color: #dddddd; }
        
        /* By default, hide both the good content and the denied message */
        #secure-content { display: none; } 
        #access-denied { display: none; color: #ff4444; } 
    </style>
        <script>
        window.onload = function() {
            var pwd = prompt('🔒 This site is password protected. Please enter the password:');
            if (pwd === 'dronerunner') {
                document.getElementById('secure-content').style.display = 'block';
            } else {
                document.getElementById('access-denied').style.display = 'block';
            }
        };
    </script>
</head>
<body>
    <div id="secure-content">
        <h1>Success! 🚀</h1>
        <p>This is the NEW test file uploaded straight from PowerShell.</p>
        <p>You successfully passed the security check!</p>
    </div>
    
    <div id="access-denied">
        <h1>Access Denied 🛑</h1>
        <p>You did not enter the correct password. Please refresh the page to try again.</p>
    </div>
</body>
</html>
